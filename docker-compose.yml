version: '3.9'

services:
  portfolio:
    build: .
    ports:
      - '8080:80'
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - VITE_CV_PDF_URL=${VITE_CV_PDF_URL}
      - VITE_CV_MARKDOWN_URL=${VITE_CV_MARKDOWN_URL}
