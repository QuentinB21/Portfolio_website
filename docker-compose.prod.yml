name: portfolio-prod

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      PRIMARY_DOMAIN: ${PRIMARY_DOMAIN}
      WWW_DOMAIN: ${WWW_DOMAIN}
      UMAMI_DOMAIN: ${UMAMI_DOMAIN}
      GRAFANA_DOMAIN: ${GRAFANA_DOMAIN}
      GRAFANA_BASIC_AUTH_USER: ${GRAFANA_BASIC_AUTH_USER}
      GRAFANA_BASIC_AUTH_HASH: ${GRAFANA_BASIC_AUTH_HASH}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - portfolio
      - umami
      - grafana

  portfolio:
    build:
      context: .
      args:
        VITE_CV_PDF_URL: ${VITE_CV_PDF_URL:-/cv.pdf}
        VITE_CV_MARKDOWN_URL: ${VITE_CV_MARKDOWN_URL:-}
        VITE_UMAMI_SCRIPT_URL: ${VITE_UMAMI_SCRIPT_URL}
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID}
    restart: unless-stopped
    expose:
      - '80'
    environment:
      PORT: 80
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      PROFILE_BIRTHDATE: ${PROFILE_BIRTHDATE}
      CHATBOT_SYSTEM_PROMPT: ${CHATBOT_SYSTEM_PROMPT}
      MONITORING_IP_HASH_SALT: ${MONITORING_IP_HASH_SALT}
    depends_on:
      - umami
      - loki
      - alloy
      - grafana

  umami-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${UMAMI_DB_NAME}
      POSTGRES_USER: ${UMAMI_DB_USER}
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
    volumes:
      - umami-db-data:/var/lib/postgresql/data

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    expose:
      - '3000'
    environment:
      DATABASE_URL: postgresql://${UMAMI_DB_USER}:${UMAMI_DB_PASSWORD}@umami-db:5432/${UMAMI_DB_NAME}
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      - umami-db

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/config.yml
    expose:
      - '3100'
    volumes:
      - ./observability/loki-config.prod.yml:/etc/loki/config.yml:ro
      - loki-data:/loki

  alloy:
    image: grafana/alloy:latest
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki

  grafana:
    image: grafana/grafana-oss:latest
    restart: unless-stopped
    expose:
      - '3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN}
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki

volumes:
  caddy-data:
  caddy-config:
  umami-db-data:
  loki-data:
  grafana-data:
